<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta property="og:type" content="article">
<meta name="article:section" content="Books">
<title>Libro — ePub Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400;1,8..60,500&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #FAF8F4; --text: #2A2520; --text-light: #7A7570;
    --accent: #B85C38; --accent-soft: #F0E6DD;
    --border: #E8E2DA; --card-bg: #fff;
    --reading-width: 38em;
    --font-body: 'Source Serif 4', Georgia, serif;
    --font-ui: 'DM Sans', system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #1C1A17; --text: #E0DBD4; --text-light: #8A857E;
    --accent: #D4835E; --accent-soft: #2E2620;
    --border: #3A352E; --card-bg: #252220;
  }
  [data-theme="sepia"] {
    --bg: #F2E8D5; --text: #3D3228; --text-light: #7A6F60;
    --accent: #A0522D; --accent-soft: #E6D8C0;
    --border: #D4C8B0; --card-bg: #F8F0E0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 18px; scroll-behavior: smooth; }
  body {
    font-family: var(--font-body); background: var(--bg); color: var(--text);
    line-height: 1.72; transition: background 0.3s, color 0.3s;
    -webkit-text-size-adjust: 100%;
  }
  body.size-s { font-size: 16px; } body.size-m { font-size: 18px; }
  body.size-l { font-size: 21px; } body.size-xl { font-size: 24px; }

  /* ═══════ LIBRARY VIEW ═══════ */
  #library-view { min-height: 100dvh; padding: 1.5rem; }
  #library-view.hidden { display: none; }

  .lib-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.8rem; max-width: 40rem; margin-left: auto; margin-right: auto;
  }
  .lib-header h1 {
    font-family: var(--font-ui); font-size: 1.5rem; font-weight: 600;
    letter-spacing: -0.03em;
  }
  .add-btn {
    font-family: var(--font-ui); font-size: 0.78rem; font-weight: 500;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 0.5rem 1rem; cursor: pointer; position: relative; overflow: hidden;
  }
  .add-btn input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .book-grid {
    max-width: 40rem; margin: 0 auto;
    display: grid; grid-template-columns: 1fr; gap: 0.8rem;
  }

  .book-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 1rem 1.1rem; cursor: pointer; transition: box-shadow 0.15s;
    display: flex; justify-content: space-between; align-items: center;
    -webkit-tap-highlight-color: transparent;
  }
  .book-card:active { box-shadow: 0 0 0 2px var(--accent); }

  .book-info { flex: 1; min-width: 0; }
  .book-info .title {
    font-family: var(--font-ui); font-size: 0.88rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .book-info .author {
    font-family: var(--font-ui); font-size: 0.72rem; color: var(--text-light);
    margin-top: 0.15rem;
  }
  .book-info .meta {
    font-family: var(--font-ui); font-size: 0.65rem; color: var(--text-light);
    margin-top: 0.35rem; display: flex; gap: 0.8rem;
  }

  .progress-ring {
    width: 2.2rem; height: 2.2rem; flex-shrink: 0; margin-left: 0.8rem;
  }
  .progress-ring circle {
    fill: none; stroke-width: 3;
  }
  .progress-ring .bg { stroke: var(--border); }
  .progress-ring .fg { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 0.3s; }

  .book-actions {
    display: flex; gap: 0.4rem; margin-left: 0.5rem; flex-shrink: 0;
  }
  .del-btn, .rename-btn {
    font-family: var(--font-ui); font-size: 0.65rem; color: var(--text-light);
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 0.25rem 0.5rem; cursor: pointer;
  }
  .del-btn:active { color: #c33; border-color: #c33; }

  .rename-input {
    font-family: var(--font-ui); font-size: 0.88rem; font-weight: 600;
    border: 1px solid var(--accent); border-radius: 4px;
    background: var(--bg); color: var(--text);
    padding: 0.1rem 0.3rem; width: 100%; outline: none;
  }

  .empty-lib {
    text-align: center; padding: 4rem 2rem; color: var(--text-light);
    font-family: var(--font-ui);
  }
  .empty-lib .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
  .empty-lib p { font-size: 0.82rem; line-height: 1.5; }

  /* ═══════ READER VIEW ═══════ */
  #reader-view { display: none; }
  #reader-view.active { display: block; }

  #toolbar {
    position: sticky; top: 0; z-index: 100; background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 0.8rem; display: flex; align-items: center;
    justify-content: space-between; gap: 0.4rem;
  }
  .tb { /* toolbar button */
    font-family: var(--font-ui); background: none; border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.7rem;
    padding: 0.32rem 0.6rem; cursor: pointer; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .tb:active { background: var(--accent-soft); }
  #title-bar {
    font-family: var(--font-ui); font-size: 0.72rem; font-weight: 500;
    color: var(--text-light); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; flex: 1; min-width: 0; text-align: center;
  }
  .tb-group { display: flex; gap: 0.3rem; flex-shrink: 0; }

  /* Reading progress bar */
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 3px; background: var(--accent);
    z-index: 101; transition: width 0.15s; width: 0;
  }

  /* Article content — the key to Safari Reader detection */
  #book-article {
    max-width: var(--reading-width); margin: 0 auto;
    padding: 2rem 1.2rem 8rem;
  }

  #book-article > header {
    margin-bottom: 2.5rem; padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  #book-article > header h1 {
    font-family: var(--font-ui); font-size: 1.5rem; font-weight: 600;
    letter-spacing: -0.02em; line-height: 1.25;
  }
  #book-article > header .byline {
    font-family: var(--font-ui); font-size: 0.85rem; color: var(--text-light);
    margin-top: 0.3rem;
  }

  .chapter-sep {
    text-align: center; padding: 1.5rem 0; margin: 2rem 0;
    border-top: 1px solid var(--border);
    font-family: var(--font-ui); font-size: 0.68rem; font-weight: 600;
    color: var(--text-light); letter-spacing: 0.1em;
  }

  #book-article h2, #book-article h3, #book-article h4,
  #book-article h5, #book-article h6 {
    font-family: var(--font-ui); line-height: 1.3; margin: 1.5em 0 0.6em;
  }
  #book-article h2 { font-size: 1.25rem; }
  #book-article h3 { font-size: 1.1rem; }
  #book-article p { margin-bottom: 0.85em; text-align: justify; hyphens: auto; -webkit-hyphens: auto; }
  #book-article blockquote {
    border-left: 3px solid var(--accent); padding-left: 1.2em;
    margin: 1.2em 0; color: var(--text-light); font-style: italic;
  }
  #book-article a { color: var(--accent); }
  #book-article img { max-width: 100%; height: auto; border-radius: 4px; margin: 1em 0; }
  #book-article ul, #book-article ol { padding-left: 1.5em; margin-bottom: 0.85em; }
  #book-article li { margin-bottom: 0.3em; }
  #book-article table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.88rem; }
  #book-article th, #book-article td { border: 1px solid var(--border); padding: 0.5em 0.7em; }

  /* Strip epub's own styling */
  #article-body * {
    max-width: 100% !important; font-family: inherit !important;
    color: inherit !important; background: transparent !important;
  }

  /* ═══════ OVERLAYS ═══════ */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.35);
  }
  .overlay.open { display: flex; }

  #toc-inner {
    background: var(--bg); width: min(85vw, 22rem); height: 100%;
    overflow-y: auto; padding: 1.2rem;
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
  }
  #toc-inner h2 {
    font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600;
    color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;
  }
  #toc-inner h2 button { background: none; border: none; font-size: 1.1rem; color: var(--text-light); cursor: pointer; padding: 0.3rem; }
  #toc-list { list-style: none; }
  #toc-list li a {
    display: block; font-family: var(--font-ui); font-size: 0.8rem; color: var(--text);
    text-decoration: none; padding: 0.5rem 0; border-bottom: 1px solid var(--border);
  }

  #settings-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 1.2rem; box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    border-radius: 16px 16px 0 0; display: none;
  }
  #settings-sheet.open { display: block; }

  .srow {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem; font-family: var(--font-ui); font-size: 0.78rem;
  }
  .srow label { color: var(--text-light); font-weight: 500; }
  .sopts { display: flex; gap: 0.3rem; }
  .sopts button {
    font-family: var(--font-ui); font-size: 0.7rem; padding: 0.3rem 0.65rem;
    border: 1px solid var(--border); border-radius: 6px; background: none;
    color: var(--text); cursor: pointer;
  }
  .sopts button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tdot {
    width: 1.5rem; height: 1.5rem; border-radius: 50%; border: 2px solid var(--border); cursor: pointer;
  }
  .tdot[data-t="light"] { background: #FAF8F4; }
  .tdot[data-t="dark"]  { background: #1C1A17; }
  .tdot[data-t="sepia"] { background: #F2E8D5; }
  .tdot.on { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .sdone {
    display: block; width: 100%; text-align: center; font-family: var(--font-ui);
    font-size: 0.78rem; font-weight: 500; color: var(--accent);
    background: none; border: none; padding: 0.6rem; cursor: pointer; margin-top: 0.5rem;
  }

  #back-top {
    position: fixed; bottom: 1.5rem; right: 1rem;
    background: var(--accent); color: #fff; border: none; border-radius: 50%;
    width: 2.6rem; height: 2.6rem; font-size: 1rem; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 50;
  }
  #back-top.show { opacity: 1; pointer-events: auto; }

  /* Loading spinner */
  .spinner {
    display: inline-block; width: 1.2rem; height: 1.2rem;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #loading-msg {
    display: none; font-family: var(--font-ui); font-size: 0.82rem;
    color: var(--text-light); text-align: center; padding: 2rem;
  }
  #loading-msg.on { display: block; }

  /* ═══════ PASSWORD GATE ═══════ */
  #pw-gate {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
  }
  #pw-gate.unlocked { display: none; }
  #pw-box {
    width: min(22rem, 90vw); display: flex; flex-direction: column; gap: 1rem;
  }
  #pw-box h1 {
    font-family: var(--font-ui); font-size: 1.5rem; font-weight: 600;
    letter-spacing: -0.03em; text-align: center;
  }
  #pw-input {
    font-family: var(--font-ui); font-size: 0.9rem;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--card-bg); color: var(--text);
    padding: 0.65rem 0.9rem; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  #pw-input:focus { border-color: var(--accent); }
  #pw-input.wrong { border-color: #c33; animation: shake 0.3s; }
  #pw-btn {
    font-family: var(--font-ui); font-size: 0.82rem; font-weight: 500;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 0.6rem; cursor: pointer; width: 100%;
  }
  #pw-err {
    font-family: var(--font-ui); font-size: 0.75rem; color: #c33;
    text-align: center; min-height: 1em;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }
</style>
</head>
<body>

<!-- ═══════ PASSWORD GATE ═══════ -->
<div id="pw-gate">
  <div id="pw-box">
    <h1>Libro</h1>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
    <button id="pw-btn">Enter</button>
    <div id="pw-err"></div>
  </div>
</div>

<!-- ═══════ LIBRARY ═══════ -->
<div id="library-view">
  <div class="lib-header">
    <h1>Libro</h1>
    <label class="add-btn">
      + Add Book
      <input type="file" id="file-input" accept=".epub,.docx" multiple>
    </label>
  </div>
  <div id="book-grid"></div>
  <div id="empty-state" class="empty-lib">
    <div class="icon">📚</div>
    <p>Your library is empty.<br>Add an ePub or DOCX to get started.</p>
    <p style="margin-top:1rem;font-size:0.7rem;">Once open, use Safari's <strong>Listen to Page</strong><br>or <strong>Speak Screen</strong> (two-finger swipe down) to listen.</p>
  </div>
  <div id="loading-msg"><span class="spinner"></span>Unpacking book…</div>
</div>

<!-- ═══════ READER ═══════ -->
<main id="reader-view">
  <div id="progress-bar"></div>
  <nav id="toolbar">
    <button class="tb" id="btn-back">← Library</button>
    <div id="title-bar"></div>
    <div class="tb-group">
      <button class="tb" id="btn-toc">Contents</button>
      <button class="tb" id="btn-set">Aa</button>
    </div>
  </nav>
  <article id="book-article" role="article">
    <header>
      <h1 id="art-title"></h1>
      <p class="byline" id="art-author"></p>
    </header>
    <section id="article-body"></section>
  </article>
  <button id="back-top" aria-label="Back to top">↑</button>
</main>

<!-- TOC -->
<div class="overlay" id="toc-overlay">
  <div id="toc-inner">
    <h2>Contents <button id="toc-x">✕</button></h2>
    <ul id="toc-list"></ul>
  </div>
</div>

<!-- Settings -->
<div id="settings-sheet">
  <div class="srow">
    <label>Size</label>
    <div class="sopts" id="sz-opts">
      <button data-sz="size-s" style="font-size:0.62rem">A</button>
      <button data-sz="size-m" class="on">A</button>
      <button data-sz="size-l" style="font-size:0.85rem">A</button>
      <button data-sz="size-xl" style="font-size:0.95rem">A</button>
    </div>
  </div>
  <div class="srow">
    <label>Theme</label>
    <div class="sopts" id="th-opts">
      <div class="tdot on" data-t="light"></div>
      <div class="tdot" data-t="sepia"></div>
      <div class="tdot" data-t="dark"></div>
    </div>
  </div>
  <button class="sdone" id="set-done">Done</button>
</div>

<script>
// ═══════════════════════════════════════════════════
// IndexedDB
// ═══════════════════════════════════════════════════
const DB = 'libroBooks', DBV = 1;
function idb() {
  return new Promise((ok, no) => {
    const r = indexedDB.open(DB, DBV);
    r.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('books')) db.createObjectStore('books', { keyPath: 'id' });
    };
    r.onsuccess = e => ok(e.target.result);
    r.onerror = e => no(e.target.error);
  });
}
async function dbPut(book) {
  const db = await idb();
  return new Promise((ok, no) => {
    const tx = db.transaction('books', 'readwrite');
    tx.objectStore('books').put(book); tx.oncomplete = ok; tx.onerror = e => no(e.target.error);
  });
}
async function dbAll() {
  const db = await idb();
  return new Promise((ok, no) => {
    const r = db.transaction('books').objectStore('books').getAll();
    r.onsuccess = () => ok(r.result); r.onerror = e => no(e.target.error);
  });
}
async function dbGet(id) {
  const db = await idb();
  return new Promise((ok, no) => {
    const r = db.transaction('books').objectStore('books').get(id);
    r.onsuccess = () => ok(r.result); r.onerror = e => no(e.target.error);
  });
}
async function dbDel(id) {
  const db = await idb();
  return new Promise((ok, no) => {
    const tx = db.transaction('books', 'readwrite');
    tx.objectStore('books').delete(id); tx.oncomplete = ok; tx.onerror = e => no(e.target.error);
  });
}

// ═══════════════════════════════════════════════════
// Settings (localStorage)
// ═══════════════════════════════════════════════════
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('libro-settings'));
    if (s?.theme) document.documentElement.setAttribute('data-theme', s.theme);
    if (s?.size) document.body.className = s.size;
    // sync UI
    document.querySelectorAll('.tdot').forEach(d => d.classList.toggle('on', d.dataset.t === (s?.theme || 'light')));
    document.querySelectorAll('#sz-opts button').forEach(b => b.classList.toggle('on', b.dataset.sz === (s?.size || 'size-m')));
  } catch {}
}
function saveSettings() {
  try {
    const theme = document.documentElement.getAttribute('data-theme') || 'light';
    const size = document.body.className || 'size-m';
    localStorage.setItem('libro-settings', JSON.stringify({ theme, size }));
  } catch {}
}

// ═══════════════════════════════════════════════════
// Reading position (localStorage)
// ═══════════════════════════════════════════════════
let currentBookId = null;
function savePos() {
  if (!currentBookId) return;
  try {
    const h = document.documentElement.scrollHeight - window.innerHeight;
    const pct = h > 0 ? Math.min(1, window.scrollY / h) : 0;
    localStorage.setItem('libro-pos-' + currentBookId, JSON.stringify({ y: window.scrollY, pct, t: Date.now() }));
  } catch {}
}
function loadPos(bookId) {
  try {
    return JSON.parse(localStorage.getItem('libro-pos-' + bookId));
  } catch { return null; }
}
function clearPos(bookId) {
  try { localStorage.removeItem('libro-pos-' + bookId); } catch {}
}

// Auto-save while reading
let posSaveTimer;
function startPosSaving() { posSaveTimer = setInterval(savePos, 2500); }
function stopPosSaving() { clearInterval(posSaveTimer); savePos(); }

// ═══════════════════════════════════════════════════
// ePub parser
// ═══════════════════════════════════════════════════
function resolveHref(base, href) {
  if (href.startsWith('/')) return href.substring(1);
  let p = base.substring(0, base.lastIndexOf('/') + 1) + href;
  while (p.includes('../')) p = p.replace(/[^/]+\/\.\.\//g, '');
  return p.replace('./', '');
}

async function parseEpub(file) {
  const zip = await JSZip.loadAsync(file);
  const P = new DOMParser();

  const cXml = await zip.file('META-INF/container.xml')?.async('text');
  if (!cXml) throw new Error('Invalid ePub');
  const opfPath = P.parseFromString(cXml, 'application/xml').querySelector('rootfile')?.getAttribute('full-path');
  if (!opfPath) throw new Error('No OPF');
  const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

  const opfDoc = P.parseFromString(await zip.file(opfPath).async('text'), 'application/xml');
  const title = opfDoc.querySelector('metadata title')?.textContent || file.name.replace('.epub', '');
  const author = opfDoc.querySelector('metadata creator')?.textContent || '';

  const manifest = {};
  opfDoc.querySelectorAll('manifest item').forEach(it => {
    manifest[it.getAttribute('id')] = { href: it.getAttribute('href'), type: it.getAttribute('media-type') };
  });

  const spine = [];
  opfDoc.querySelectorAll('spine itemref').forEach(r => spine.push(r.getAttribute('idref')));

  // TOC
  const tocItems = [];
  const ncxId = Object.keys(manifest).find(id => manifest[id].type === 'application/x-dtbncx+xml');
  if (ncxId) {
    const ncxXml = await zip.file(opfDir + manifest[ncxId].href)?.async('text');
    if (ncxXml) {
      P.parseFromString(ncxXml, 'application/xml').querySelectorAll('navPoint').forEach(np => {
        const label = np.querySelector('navLabel text')?.textContent?.trim();
        const src = np.querySelector('content')?.getAttribute('src');
        if (label && src) tocItems.push({ label, href: src.split('#')[0], frag: src.includes('#') ? src.split('#')[1] : null });
      });
    }
  }
  if (!tocItems.length) {
    const navId = Object.keys(manifest).find(id =>
      manifest[id].type?.includes('html') && (manifest[id].href?.includes('nav') || manifest[id].href?.includes('toc'))
    );
    if (navId) {
      const navHtml = await zip.file(opfDir + manifest[navId].href)?.async('text');
      if (navHtml) {
        P.parseFromString(navHtml, 'text/html').querySelectorAll('nav a, a').forEach(a => {
          const label = a.textContent?.trim(), href = a.getAttribute('href');
          if (label && href && !href.startsWith('#'))
            tocItems.push({ label, href: href.split('#')[0], frag: href.includes('#') ? href.split('#')[1] : null });
        });
      }
    }
  }

  // Chapters
  const chapters = [];
  for (const id of spine) {
    const e = manifest[id];
    if (!e || (!e.type.includes('html') && !e.type.includes('xml'))) continue;
    const fp = opfDir + e.href;
    const html = await zip.file(fp)?.async('text');
    if (!html) continue;
    const doc = P.parseFromString(html, 'text/html');
    const body = doc.querySelector('body');
    if (!body) continue;

    // Inline images
    for (const img of body.querySelectorAll('img, image')) {
      const src = img.getAttribute('src') || img.getAttribute('xlink:href');
      if (!src) continue;
      const ip = resolveHref(fp, src);
      const f = zip.file(ip);
      if (f) {
        const b64 = await f.async('base64');
        const ext = src.split('.').pop().toLowerCase();
        const mime = ext==='png'?'image/png':ext==='svg'?'image/svg+xml':ext==='gif'?'image/gif':'image/jpeg';
        img.setAttribute('src', `data:${mime};base64,${b64}`);
      }
    }
    body.querySelectorAll('style, link').forEach(el => el.remove());
    const txt = body.textContent.trim();
    if (txt.length < 3 && !body.querySelector('img')) continue;
    chapters.push({ href: e.href, html: body.innerHTML });
  }

  const bookId = (title + '-' + author).replace(/\W+/g, '-').toLowerCase().substring(0, 80) + '-' + Date.now().toString(36);
  return { id: bookId, title, author, chapters, tocItems, addedAt: Date.now() };
}

// ═══════════════════════════════════════════════════
// DOCX parser
// ═══════════════════════════════════════════════════
async function parseDocx(file) {
  const zip = await JSZip.loadAsync(file);
  const P = new DOMParser();
  const NS = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';

  // Metadata from docProps/core.xml
  let title = file.name.replace(/\.docx$/i, '');
  let author = '';
  const coreXml = await zip.file('docProps/core.xml')?.async('text');
  if (coreXml) {
    const core = P.parseFromString(coreXml, 'application/xml');
    const dcNS = 'http://purl.org/dc/elements/1.1/';
    title = core.getElementsByTagNameNS(dcNS, 'title')[0]?.textContent || title;
    author = core.getElementsByTagNameNS(dcNS, 'creator')[0]?.textContent || '';
  }

  // Main document body — footnotes/endnotes live in separate files we never load
  const docXml = await zip.file('word/document.xml')?.async('text');
  if (!docXml) throw new Error('Invalid DOCX');
  const doc = P.parseFromString(docXml, 'application/xml');

  let html = '';
  for (const p of Array.from(doc.getElementsByTagNameNS(NS, 'p'))) {
    // Paragraph style (Heading1, Heading2, Title, …)
    const pStyleEl = p.getElementsByTagNameNS(NS, 'pStyle')[0];
    const pStyle = pStyleEl?.getAttributeNS(NS, 'val') || pStyleEl?.getAttribute('w:val') || '';

    // Collect text from runs, skipping footnote / endnote / comment refs
    let text = '';
    for (const r of Array.from(p.getElementsByTagNameNS(NS, 'r'))) {
      if (r.getElementsByTagNameNS(NS, 'footnoteReference').length) continue;
      if (r.getElementsByTagNameNS(NS, 'endnoteReference').length) continue;
      if (r.getElementsByTagNameNS(NS, 'commentReference').length) continue;
      if (r.parentElement?.localName === 'del') continue; // tracked deletions

      const rPr = r.getElementsByTagNameNS(NS, 'rPr')[0];
      const bold   = !!rPr?.getElementsByTagNameNS(NS, 'b').length;
      const italic = !!rPr?.getElementsByTagNameNS(NS, 'i').length;

      let run = '';
      for (const t of r.getElementsByTagNameNS(NS, 't')) run += t.textContent;
      if (!run) continue;

      const e = esc(run);
      text += bold && italic ? `<strong><em>${e}</em></strong>`
            : bold           ? `<strong>${e}</strong>`
            : italic         ? `<em>${e}</em>`
            :                  e;
    }

    if (!text.trim()) continue;

    if (/^Heading1$/i.test(pStyle) || pStyle === 'Title')
      html += `<h2>${text}</h2>`;
    else if (/^Heading[2-6]$/i.test(pStyle) || pStyle === 'Subtitle')
      html += `<h3>${text}</h3>`;
    else
      html += `<p>${text}</p>`;
  }

  if (!html.trim()) throw new Error('No readable content found in DOCX');

  const bookId = (title + '-' + author).replace(/\W+/g, '-').toLowerCase().substring(0, 80) + '-' + Date.now().toString(36);
  return { id: bookId, title, author, chapters: [{ href: 'document', html }], tocItems: [], addedAt: Date.now() };
}

// ═══════════════════════════════════════════════════
// Library UI
// ═══════════════════════════════════════════════════
const gridEl = document.getElementById('book-grid');
const emptyEl = document.getElementById('empty-state');
const loadingEl = document.getElementById('loading-msg');

async function renderLibrary() {
  let books = [];
  try { books = await dbAll(); } catch { books = []; }
  // Sort by last read
  books.sort((a, b) => {
    const pa = loadPos(a.id), pb = loadPos(b.id);
    return (pb?.t || b.addedAt) - (pa?.t || a.addedAt);
  });

  gridEl.innerHTML = '';
  emptyEl.style.display = books.length ? 'none' : 'block';

  books.forEach(book => {
    const pos = loadPos(book.id);
    const pct = pos ? Math.round(pos.pct * 100) : 0;
    const lastRead = pos ? timeAgo(pos.t) : 'Not started';

    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="book-info">
        <div class="title">${esc(book.title)}</div>
        <div class="author">${esc(book.author || 'Unknown')}</div>
        <div class="meta"><span>${pct}% read</span><span>${lastRead}</span><span>${book.chapters.length} ch.</span></div>
      </div>
      ${progressSVG(pct)}
      <div class="book-actions"><button class="rename-btn">Rename</button><button class="del-btn" data-id="${book.id}">Remove</button></div>
    `;
    card.addEventListener('click', e => {
      if (e.target.closest('.del-btn')) return;
      openBook(book.id);
    });
    card.querySelector('.del-btn').addEventListener('click', async e => {
      e.stopPropagation();
      if (confirm('Remove "' + book.title + '" from library?')) {
        await dbDel(book.id);
        clearPos(book.id);
        renderLibrary();
      }
    });
    card.querySelector('.rename-btn').addEventListener('click', async e => {
      e.stopPropagation();
      const titleEl = card.querySelector('.title');
      const origTitle = book.title;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = origTitle;
      input.className = 'rename-input';
      titleEl.replaceWith(input);
      input.focus(); input.select();
      let done = false;
      async function commit() {
        if (done) return; done = true;
        const v = input.value.trim();
        if (v && v !== origTitle) { book.title = v; await dbPut(book); }
        renderLibrary();
      }
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') { ev.preventDefault(); commit(); }
        if (ev.key === 'Escape') { done = true; renderLibrary(); }
      });
    });
    gridEl.appendChild(card);
  });
}

function progressSVG(pct) {
  const r = 14, C = 2 * Math.PI * r;
  const off = C - (pct / 100) * C;
  return `<svg class="progress-ring" viewBox="0 0 34 34">
    <circle class="bg" cx="17" cy="17" r="${r}"/>
    <circle class="fg" cx="17" cy="17" r="${r}" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 17 17)"/>
    <text x="17" y="18" text-anchor="middle" dominant-baseline="middle" font-family="var(--font-ui)" font-size="8" fill="var(--text-light)">${pct}%</text>
  </svg>`;
}

function timeAgo(ts) {
  const d = Date.now() - ts, m = Math.floor(d / 60000);
  if (m < 1) return 'Just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const dy = Math.floor(h / 24);
  return dy === 1 ? 'Yesterday' : dy + 'd ago';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ═══════════════════════════════════════════════════
// Open book
// ═══════════════════════════════════════════════════
async function openBook(id) {
  const book = await dbGet(id);
  if (!book) return;
  currentBookId = id;

  // Update page metadata for Safari Reader
  document.title = book.title;
  document.querySelector('meta[property="og:type"]')?.setAttribute('content', 'article');

  // Set header
  document.getElementById('art-title').textContent = book.title;
  document.getElementById('art-author').textContent = book.author || '';
  document.getElementById('title-bar').textContent = book.title;

  // Render chapters into article body
  const body = document.getElementById('article-body');
  body.innerHTML = '';
  book.chapters.forEach((ch, i) => {
    const sec = document.createElement('section');
    sec.id = 'ch-' + i;
    sec.setAttribute('data-href', ch.href);
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'chapter-sep';
      sep.textContent = '· · ·';
      sec.appendChild(sep);
    }
    sec.innerHTML += ch.html;
    body.appendChild(sec);
  });

  // Build TOC
  renderTOC(book.tocItems);

  // Switch views
  document.getElementById('library-view').classList.add('hidden');
  document.getElementById('reader-view').classList.add('active');

  // Restore position
  const pos = loadPos(id);
  if (pos && pos.y > 0) {
    requestAnimationFrame(() => {
      window.scrollTo(0, pos.y);
    });
  } else {
    window.scrollTo(0, 0);
  }

  startPosSaving();
}

function renderTOC(tocItems) {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  const secs = document.querySelectorAll('#article-body > section');

  if (!tocItems.length) {
    secs.forEach((s, i) => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + s.id; a.textContent = 'Chapter ' + (i + 1);
      a.addEventListener('click', e => { e.preventDefault(); s.scrollIntoView({ behavior: 'smooth' }); closeTOC(); });
      li.appendChild(a); list.appendChild(li);
    });
    return;
  }
  tocItems.forEach(item => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#'; a.textContent = item.label;
    a.addEventListener('click', e => {
      e.preventDefault();
      const target = [...secs].find(s => {
        const h = s.getAttribute('data-href');
        return h === item.href || h?.endsWith('/' + item.href) || item.href?.endsWith(h);
      });
      if (target) {
        if (item.frag) {
          const fe = target.querySelector('#' + CSS.escape(item.frag));
          if (fe) { fe.scrollIntoView({ behavior: 'smooth' }); closeTOC(); return; }
        }
        target.scrollIntoView({ behavior: 'smooth' });
      }
      closeTOC();
    });
    li.appendChild(a); list.appendChild(li);
  });
}

function closeBook() {
  stopPosSaving();
  currentBookId = null;
  document.getElementById('reader-view').classList.remove('active');
  document.getElementById('library-view').classList.remove('hidden');
  document.getElementById('article-body').innerHTML = '';
  document.title = 'Libro — ePub Reader';
  renderLibrary();
}

// ═══════════════════════════════════════════════════
// Event wiring
// ═══════════════════════════════════════════════════

// File input
document.getElementById('file-input').addEventListener('change', async e => {
  const files = [...e.target.files];
  if (!files.length) return;
  loadingEl.classList.add('on');
  for (const f of files) {
    try {
      const book = f.name.toLowerCase().endsWith('.docx') ? await parseDocx(f) : await parseEpub(f);
      await dbPut(book);
    } catch (err) {
      alert('Error with ' + f.name + ': ' + err.message);
    }
  }
  loadingEl.classList.remove('on');
  e.target.value = '';
  renderLibrary();
});

// Toolbar
document.getElementById('btn-back').addEventListener('click', closeBook);
document.getElementById('btn-toc').addEventListener('click', () => document.getElementById('toc-overlay').classList.add('open'));
function closeTOC() { document.getElementById('toc-overlay').classList.remove('open'); }
document.getElementById('toc-x').addEventListener('click', closeTOC);
document.getElementById('toc-overlay').addEventListener('click', e => { if (e.target.id === 'toc-overlay') closeTOC(); });

document.getElementById('btn-set').addEventListener('click', () => document.getElementById('settings-sheet').classList.toggle('open'));
document.getElementById('set-done').addEventListener('click', () => document.getElementById('settings-sheet').classList.remove('open'));

// Font size
document.querySelectorAll('#sz-opts button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#sz-opts button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.body.className = btn.dataset.sz;
    saveSettings();
  });
});

// Theme
document.querySelectorAll('.tdot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.tdot').forEach(d => d.classList.remove('on'));
    dot.classList.add('on');
    document.documentElement.setAttribute('data-theme', dot.dataset.t);
    saveSettings();
  });
});

// Progress bar + back-to-top
const progBar = document.getElementById('progress-bar');
const btt = document.getElementById('back-top');
window.addEventListener('scroll', () => {
  if (!currentBookId) return;
  const h = document.documentElement.scrollHeight - window.innerHeight;
  if (h > 0) progBar.style.width = (window.scrollY / h * 100) + '%';
  btt.classList.toggle('show', window.scrollY > 600);
}, { passive: true });
btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ═══════════════════════════════════════════════════
// Password gate
// ═══════════════════════════════════════════════════
(function() {
  const GATE = document.getElementById('pw-gate');
  const INPUT = document.getElementById('pw-input');
  const BTN   = document.getElementById('pw-btn');
  const ERR   = document.getElementById('pw-err');

  if (sessionStorage.getItem('libro-auth') === '1') { GATE.classList.add('unlocked'); return; }

  function attempt() {
    if (INPUT.value === 'BooksMirko') {
      sessionStorage.setItem('libro-auth', '1');
      GATE.classList.add('unlocked');
    } else {
      ERR.textContent = 'Incorrect password.';
      INPUT.classList.add('wrong');
      INPUT.value = '';
      setTimeout(() => INPUT.classList.remove('wrong'), 400);
      INPUT.focus();
    }
  }

  BTN.addEventListener('click', attempt);
  INPUT.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  INPUT.focus();
})();

// ═══════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════
loadSettings();
renderLibrary();
</script>
